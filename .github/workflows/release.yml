name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin --bundles app,dmg'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            args: '--bundles appimage,deb'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            args: '--bundles nsis,msi'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Print environment info
        run: |
          echo "=== System Info ==="
          uname -a
          echo ""
          echo "=== Disk Space ==="
          df -h /
          echo ""

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Print Node.js version
        run: node --version && npm --version

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Print Rust version
        run: rustc --version && cargo --version && rustup target list --installed

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'GitSneaker ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Print build artifacts (unix)
        if: always() && runner.os != 'Windows'
        run: |
          echo "=== Build Artifacts ==="
          find src-tauri/target \( -name "*.dmg" -o -name "*.app" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.nsis" -o -name "*.msi" \) 2>/dev/null || echo "No artifacts found"

      - name: Print build artifacts (windows)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "=== Build Artifacts ==="
          Get-ChildItem -Path src-tauri/target -Recurse -Include *.dmg,*.app,*.AppImage,*.deb,*.nsis,*.msi -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
          if (-not $?) { echo "No artifacts found" }
