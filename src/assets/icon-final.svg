<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#313244"/>
      <stop offset="100%" style="stop-color:#1e1e2e"/>
    </linearGradient>
    <linearGradient id="usbGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89b4fa"/>
      <stop offset="50%" style="stop-color:#b4befe"/>
      <stop offset="100%" style="stop-color:#89b4fa"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a6e3a1"/>
      <stop offset="100%" style="stop-color:#94e2d5"/>
    </linearGradient>
    <linearGradient id="branchGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f9e2af"/>
      <stop offset="100%" style="stop-color:#fab387"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>

  <!-- U盘主体 -->
  <rect x="80" y="148" width="320" height="216" rx="32" fill="#232336" filter="url(#shadow)"/>
  <rect x="80" y="148" width="320" height="216" rx="32" fill="none" stroke="url(#usbGrad)" stroke-width="6"/>

  <!-- USB 接口 -->
  <rect x="384" y="188" width="80" height="136" rx="20" fill="url(#usbGrad)" filter="url(#glow)"/>
  <rect x="400" y="216" width="48" height="80" rx="10" fill="#1e1e2e"/>
  <rect x="408" y="232" width="32" height="48" rx="6" fill="#313244"/>

  <!-- Git 分支 - 主线 -->
  <path d="M136 256 L304 256" stroke="url(#greenGrad)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Git 分支 - 上分支 -->
  <path d="M192 256 Q248 256 272 196" stroke="url(#branchGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Git 分支 - 下分支 -->
  <path d="M192 256 Q248 256 272 316" stroke="url(#branchGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Git 节点 - 起点 -->
  <circle cx="136" cy="256" r="28" fill="#1e1e2e" stroke="url(#greenGrad)" stroke-width="7"/>
  <circle cx="136" cy="256" r="12" fill="url(#greenGrad)"/>

  <!-- Git 节点 - 上分支 -->
  <circle cx="272" cy="196" r="18" fill="#1e1e2e" stroke="url(#usbGrad)" stroke-width="5"/>
  <circle cx="272" cy="196" r="7" fill="url(#usbGrad)"/>

  <!-- Git 节点 - 下分支 -->
  <circle cx="272" cy="316" r="18" fill="#1e1e2e" stroke="url(#usbGrad)" stroke-width="5"/>
  <circle cx="272" cy="316" r="7" fill="url(#usbGrad)"/>

  <!-- Git 节点 - 合并点 -->
  <circle cx="340" cy="256" r="22" fill="#1e1e2e" stroke="url(#greenGrad)" stroke-width="6"/>
  <circle cx="340" cy="256" r="9" fill="url(#greenGrad)"/>

  <!-- 装饰弧线 -->
  <path d="M100 420 Q256 465 412 420" stroke="url(#greenGrad)" stroke-width="4" fill="none" opacity="0.5"/>
  <path d="M120 445 Q256 480 392 445" stroke="url(#usbGrad)" stroke-width="3" fill="none" opacity="0.35"/>
</svg>
